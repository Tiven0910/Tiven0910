<svg width="760" height="450" viewBox="0 0 760 450" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0718"/>
      <stop offset="45%" stop-color="#150f38"/>
      <stop offset="75%" stop-color="#1a1140"/>
      <stop offset="100%" stop-color="#090616"/>
    </linearGradient>

    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="35%" stop-color="#8B5CF6" stop-opacity="0.9"/>
      <stop offset="65%" stop-color="#6366F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="760" height="450" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="758" height="448" rx="17" fill="none" stroke="#8B5CF6" stroke-opacity="0.32" stroke-width="1.5"/>

  <!-- drifting nebula orbs -->
  <g>
    <ellipse cx="120" cy="55" rx="200" ry="85" fill="url(#orb)">
      <animate attributeName="opacity" values="0.55;0.9;0.55" dur="7s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="640" cy="400" rx="220" ry="90" fill="url(#orb)">
      <animate attributeName="opacity" values="0.8;0.45;0.8" dur="9s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="400" cy="220" rx="260" ry="115" fill="url(#orb)" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.6;0.35" dur="11s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- title -->
  <text x="48" y="54" fill="#EDE9FE" font-size="24" font-weight="700" letter-spacing="3" filter="url(#glow)">TECH STACK</text>
  <text x="712" y="54" fill="#A78BFA" font-size="13" font-weight="600" letter-spacing="2" text-anchor="end">FULL-STACK DEVELOPER</text>
  <rect x="48" y="68" width="664" height="2" rx="1" fill="url(#rule)"/>

  <!-- ============ LANGUAGES ============ -->
  <text x="48" y="112" fill="#A78BFA" font-size="12" font-weight="700" letter-spacing="2.5">LANGUAGES</text>
  <g fill="#1c1636" stroke="#8B5CF6" stroke-opacity="0.45" stroke-width="1">
    <rect x="48"  y="124" width="48"  height="32" rx="8"/>
    <rect x="107" y="124" width="69"  height="32" rx="8"/>
    <rect x="187" y="124" width="55"  height="32" rx="8"/>
    <rect x="253" y="124" width="98"  height="32" rx="8"/>
    <rect x="362" y="124" width="48"  height="32" rx="8"/>
    <rect x="421" y="124" width="62"  height="32" rx="8"/>
    <rect x="494" y="124" width="55"  height="32" rx="8"/>
  </g>
  <g fill="#E9E7FF" font-size="13" font-weight="600" text-anchor="middle">
    <text x="72"    y="145">PHP</text>
    <text x="141.5" y="145">Kotlin</text>
    <text x="214.5" y="145">Java</text>
    <text x="302"   y="145">JavaScript</text>
    <text x="386"   y="145">SQL</text>
    <text x="452"   y="145">HTML5</text>
    <text x="521.5" y="145">CSS3</text>
  </g>

  <!-- ============ FRONTEND ============ -->
  <text x="48" y="197" fill="#A78BFA" font-size="12" font-weight="700" letter-spacing="2.5">FRONTEND</text>
  <g fill="#1c1636" stroke="#8B5CF6" stroke-opacity="0.45" stroke-width="1">
    <rect x="48"  y="209" width="112" height="32" rx="8"/>
    <rect x="171" y="209" width="91"  height="32" rx="8"/>
    <rect x="273" y="209" width="62"  height="32" rx="8"/>
  </g>
  <g fill="#E9E7FF" font-size="13" font-weight="600" text-anchor="middle">
    <text x="104"   y="230">Tailwind CSS</text>
    <text x="216.5" y="230">Bootstrap</text>
    <text x="304"   y="230">Blade</text>
  </g>

  <!-- ============ BACKEND & DATABASES ============ -->
  <text x="48" y="282" fill="#A78BFA" font-size="12" font-weight="700" letter-spacing="2.5">BACKEND &amp; DATABASES</text>
  <g fill="#1c1636" stroke="#8B5CF6" stroke-opacity="0.45" stroke-width="1">
    <rect x="48"  y="294" width="76"  height="32" rx="8"/>
    <rect x="135" y="294" width="105" height="32" rx="8"/>
    <rect x="251" y="294" width="98"  height="32" rx="8"/>
    <rect x="360" y="294" width="62"  height="32" rx="8"/>
    <rect x="433" y="294" width="62"  height="32" rx="8"/>
    <rect x="506" y="294" width="84"  height="32" rx="8"/>
    <rect x="601" y="294" width="91"  height="32" rx="8"/>
  </g>
  <g fill="#E9E7FF" font-size="13" font-weight="600" text-anchor="middle">
    <text x="86"    y="315">Laravel</text>
    <text x="187.5" y="315">Spring Boot</text>
    <text x="300"   y="315">PostgreSQL</text>
    <text x="391"   y="315">MySQL</text>
    <text x="464"   y="315">Redis</text>
    <text x="548"   y="315">Firebase</text>
    <text x="646.5" y="315">REST APIs</text>
  </g>

  <!-- ============ CLOUD, DEVOPS & TOOLING ============ -->
  <text x="48" y="367" fill="#A78BFA" font-size="12" font-weight="700" letter-spacing="2.5">CLOUD, DEVOPS &amp; TOOLING</text>
  <g fill="#1c1636" stroke="#8B5CF6" stroke-opacity="0.45" stroke-width="1">
    <rect x="48"  y="379" width="48"  height="32" rx="8"/>
    <rect x="107" y="379" width="112" height="32" rx="8"/>
    <rect x="230" y="379" width="62"  height="32" rx="8"/>
    <rect x="303" y="379" width="69"  height="32" rx="8"/>
    <rect x="383" y="379" width="62"  height="32" rx="8"/>
  </g>
  <g fill="#E9E7FF" font-size="13" font-weight="600" text-anchor="middle">
    <text x="72"    y="400">Git</text>
    <text x="163"   y="400">GitHub/Gitea</text>
    <text x="261"   y="400">CI/CD</text>
    <text x="337.5" y="400">Docker</text>
    <text x="414"   y="400">Figma</text>
  </g>

</svg>
